<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Momento Especial ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    
    <div class="particles"></div>

    <div class="login-container">
        <form id="loginForm" class="login-box">
            <div class="heart-icon">❤️</div>
            <h2>Bienvenida a la sorpresa</h2>
            <p class="subtitle">Solo nosotros sabemos las respuestas...</p>
            
            <div class="input-group">
                <input type="text" id="userInput" required placeholder="Tu nombre especial...">
            </div>
            
            <div class="input-group">
                <input type="password" id="passInput" required placeholder="Tu contraseña secreta...">
            </div>
            
            <button type="submit" class="btn-login">
                Entrar en Nuestro Mundo
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/login.js"></script>
</body>
</html>
