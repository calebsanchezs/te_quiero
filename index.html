<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css"/>
    <title>¿Quieres ser mi novia? ❤️</title>

    <style>
        /* --- ESTILOS MEJORADOS PARA LOS RAMOS LATERALES (4 IZQ, 4 DER) --- */

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Evita scroll horizontal no deseado */
        }

        /* Contenedor principal que fija los ramos a la pantalla */
        .super-contenedor-ramos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* No bloquea los clics en los botones centrales */
            z-index: 10; /* Encima del fondo, debajo de ventanas emergentes */
        }

        /* Columnas para organizar los ramos verticalmente */
        .columna-ramos {
            position: absolute;
            top: 0;
            width: 180px; /* Ancho del área de flores lateral */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Espacia los 4 ramos uniformemente */
            padding: 20px 0; /* Margen superior e inferior interno */
            box-sizing: border-box;
        }

        .ramos-izquierda {
            left: 0; /* Pegado a la pared izquierda */
            align-items: flex-start; /* Alinea las imágenes al borde izquierdo */
        }

        .ramos-derecha {
            right: 0; /* Pegado a la pared derecha */
            align-items: flex-end; /* Alinea las imágenes al borde derecho */
        }

        /* Estilo para cada ramo individual */
        .ramo-lateral {
            width: 150px; /* Ancho de cada ramo. Ajusta si es muy grande */
            height: auto;
            opacity: 0.9;
            
            /* Configuración de la animación de balanceo */
            transform-origin: top center; /* El punto de giro es arriba (como si colgaran) */
            animation: balanceoSuave linear infinite;
        }

        /* Definición de la animación de balanceo suave */
        @keyframes balanceoSuave {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); } /* Se inclina un poco a un lado */
            50% { transform: rotate(0deg); } /* Vuelve al centro */
            75% { transform: rotate(-3deg); } /* Se inclina un poco al otro lado */
            100% { transform: rotate(0deg); } /* Vuelve al centro */
        }

        /* Tiempos de animación diferentes para que no se muevan todos igual */
        /* Izquierda */
        .ramos-izquierda .ramo-lateral:nth-child(1) { animation-duration: 6s; animation-delay: -1s; }
        .ramos-izquierda .ramo-lateral:nth-child(2) { animation-duration: 7s; animation-delay: -3s; }
        .ramos-izquierda .ramo-lateral:nth-child(3) { animation-duration: 5.5s; animation-delay: -2s; }
        .ramos-izquierda .ramo-lateral:nth-child(4) { animation-duration: 6.5s; animation-delay: -4s; }
        /* Derecha */
        .ramos-derecha .ramo-lateral:nth-child(1) { animation-duration: 7s; animation-delay: -2s; }
        .ramos-derecha .ramo-lateral:nth-child(2) { animation-duration: 5.5s; animation-delay: -4s; }
        .ramos-derecha .ramo-lateral:nth-child(3) { animation-duration: 6.5s; animation-delay: -1s; }
        .ramos-derecha .ramo-lateral:nth-child(4) { animation-duration: 6s; animation-delay: -3s; }

        /* Ajuste para celulares: ocultar ramos laterales para que no tapen el contenido */
        @media (max-width: 768px) {
            .super-contenedor-ramos {
                display: none;
            }
        }
    </style>
</head>
<body>

    <audio id="musicaFondo" loop>
        <source src="./musica/reik.mp3" type="audio/mpeg">
    </audio>

    <div class="background-overlay"></div>

    <div class="super-contenedor-ramos">
        
        <div class="columna-ramos ramos-izquierda">
            <img src="./img/floress.png" alt="Ramo flores 1" class="ramo-lateral">
            <img src="./img/floress.png" alt="Ramo flores 2" class="ramo-lateral">
            <img src="./img/floress.png" alt="Ramo flores 3" class="ramo-lateral">
            <img src="./img/floress.png" alt="Ramo flores 4" class="ramo-lateral">
        </div>

        <div class="columna-ramos ramos-derecha">
            <img src="./img/floress.png" alt="Ramo flores 5" class="ramo-lateral">
            <img src="./img/floress.png" alt="Ramo flores 6" class="ramo-lateral">
            <img src="./img/floress.png" alt="Ramo flores 7" class="ramo-lateral">
            <img src="./img/floress.png" alt="Ramo flores 8" class="ramo-lateral">
        </div>

    </div>
    <div class="rosa">
        <div class="contenedor">
            <br />
            <img src="./img/inicio.gif" class="imagen imagen-gif" id="imagen">
            <h1 id="mensaje">¿Quieres ser mi novia?</h1>
            
            <button class="boton" id="btnSi">Sí</button>
            <button class="boton" id="btnNo">No</button>

            <div class="contenedor-fotos" style="display: flex; justify-content: center; gap: 10px; margin-top: 30px;">
                <img src="./img/caleb1.png" style="width: 100px; height: 100px; border-radius: 10px; object-fit: cover; border: 3px solid #fff;">
                <img src="./img/caleb3.png" style="width: 100px; height: 100px; border-radius: 10px; object-fit: cover; border: 3px solid #fff;">
                <img src="./img/caleb2.png" style="width: 100px; height: 100px; border-radius: 10px; object-fit: cover; border: 3px solid #fff;">
            </div>

            <button class="boton" id="btnCarta" style="display: none; margin-top: 20px; background-color: #ff4d6d; width: 100%;">Leer mi carta para ti ❤️</button>
        </div>
    </div>

    <div id="lluvia-flores"></div>
    <div id="lluvia-flores-costados"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/main.js"></script>
</body>
</html>
